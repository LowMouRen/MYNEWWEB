<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    font-size: 20px;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
    background-color: #FFFFFF;
}
.bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.bg-image img {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
}
.content {
    position: relative;
    z-index: 1;
}
.search-wrapper {
    margin: 0 0 40px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
.primary-btn {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    font-size: 1.3em;
    font-weight: bold;
    cursor: pointer;
    margin: 8px 12px;
}
.primary-btn:hover {
    background-color: #DDDDDD;
}
.file-select {
    font-size: 1.2em;
    padding: 8px;
    margin: 10px;
    border: 2px solid #7F9DB9;
    background: #FFFFFF;
}
.download-submit {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 8px 24px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}
.download-submit:disabled {
    opacity: 0.5;
    cursor: default;
}
.close-btn, .refresh-btn {
    background-color: #EEEEEE;
    border: 2px solid #7F9DB9;
    color: #0000EE;
    padding: 6px 18px;
    font-size: 1em;
    cursor: pointer;
    margin: 0 8px;
}
.refresh-btn:disabled {
    opacity: 0.5;
    cursor: default;
}
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
#secondaryDownloadArea {
    margin: 20px auto;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<div class="bg-image">
    <img src="home.jpg" alt="background">
</div>

<div class="content">
    <div class="search-wrapper">
        <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Google Search">
        </form>
    </div>
    <div class="search-wrapper">
        <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Bing Search">
        </form>
    </div>

    <div class="subtitle">Download</div>
    <div>
        <button class="primary-btn" onclick="loadAndShowFileList()">Download Selected</button>
    </div>
    <div id="secondaryDownloadArea"></div>

    <ul class="link-list">
        <li><a href="IOCN_1.jpg" class="button-link">ICON 1</a></li>
        <li><a href="IOCN_2.jpg" class="button-link">ICON 2</a></li>

        <li><a href="https://wiki.pretendo.zip/game-support-status" class="button-link">PRETENDO STATUS</a></li>
        <li><a href="https://juxt.pretendo.network/login?redirect=/titles" class="button-link">Miiverse</a></li>
        <li><a href="https://time.is/Taiwan" class="button-link">TIME</a></li>
    </ul>
</div>

<script type="text/javascript">
// 全局标志，防止刷新时重复点击
var isRefreshing = false;

// 渲染文件列表面板
// files: 文件数组 [{name, url}]，若为 null 或空数组则显示空状态（下拉框提示）
// errorMsg: 可选，显示错误信息（在提示框中显示）
function renderFileListPanel(files, errorMsg) {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    
    var html = '<div style="background-color: rgba(238,238,238,0.9); border: 3px solid #7F9DB9; padding: 20px; display: inline-block; min-width: 320px;">';
    
    // 判断是否有有效文件列表
    var hasFiles = (files && files.length > 0);
    
    if (hasFiles) {
        // 有文件：显示下拉框和启用下载按钮
        html += '<select id="dynamicFileSelect" class="file-select" size="1">';
        for (var i = 0; i < files.length; i++) {
            var safeName = files[i].name.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            var safeUrl = files[i].url.replace(/&/g, '&amp;');
            html += '<option value="' + safeUrl + '">' + safeName + '</option>';
        }
        html += '</select>';
        html += '<button class="download-submit" onclick="downloadSelectedFile()" id="downloadBtn">Download</button>';
    } else {
        // 无文件：下拉框显示提示，下载按钮禁用
        var placeholderText = errorMsg ? 'Error: ' + errorMsg : 'No files - click Refresh';
        html += '<select id="dynamicFileSelect" class="file-select" size="1" disabled>';
        html += '<option value="">' + placeholderText + '</option>';
        html += '</select>';
        html += '<button class="download-submit" onclick="downloadSelectedFile()" id="downloadBtn" disabled>Download</button>';
    }
    
    // 底部的按钮行（Refresh 和 Close List）
    html += '<div style="margin-top: 15px;">';
    html += '<button class="refresh-btn" onclick="refreshFileListFromGitHub()" id="refreshButton">Refresh</button>';
    html += '<button class="close-btn" onclick="closeDownloadArea()">Close List</button>';
    html += '</div>';
    html += '</div>';
    
    container.innerHTML = html;
}

// 从 GitHub 获取文件列表并更新面板
function refreshFileListFromGitHub() {
    // 防止重复点击
    if (isRefreshing) return;
    
    // 获取当前的 Refresh 按钮并禁用
    var refreshBtn = document.getElementById('refreshButton');
    if (refreshBtn) {
        refreshBtn.disabled = true;
        refreshBtn.style.opacity = '0.6';
        refreshBtn.style.cursor = 'default';
    }
    isRefreshing = true;
    
    // 在面板中显示加载中的提示（临时将下拉框改为加载状态，但不破坏整体结构）
    var container = document.getElementById('secondaryDownloadArea');
    if (container) {
        // 临时保存当前内容，但为了体验，我们直接修改 select 的选项为加载中（如果 select 存在）
        var selectElem = document.getElementById('dynamicFileSelect');
        if (selectElem) {
            // 保存原始禁用状态，然后临时改为加载选项
            var wasDisabled = selectElem.disabled;
            selectElem.disabled = true;
            // 清空并添加加载选项
            selectElem.options.length = 0;
            var loadingOpt = document.createElement('option');
            loadingOpt.value = '';
            loadingOpt.text = 'Fetching from GitHub...';
            selectElem.appendChild(loadingOpt);
            // 同时禁用下载按钮
            var downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) downloadBtn.disabled = true;
        } else {
            // 如果没有 select（理论上应该存在），则简单显示一个加载文本
            var loadingDiv = document.createElement('div');
            loadingDiv.id = 'tempLoadingMsg';
            loadingDiv.style.margin = '10px';
            loadingDiv.style.color = '#0000EE';
            loadingDiv.innerHTML = 'Fetching file list from GitHub...';
            container.appendChild(loadingDiv);
        }
    }
    
    var apiUrl = 'https://api.github.com/repos/LowMouRen/MYNEWWEB/contents/';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', apiUrl, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            // 移除临时加载消息（如果有）
            var tempMsg = document.getElementById('tempLoadingMsg');
            if (tempMsg) tempMsg.parentNode.removeChild(tempMsg);
            
            if (xhr.status === 200) {
                try {
                    var files = JSON.parse(xhr.responseText);
                    var fileList = [];
                    for (var i = 0; i < files.length; i++) {
                        var item = files[i];
                        if (item.type === 'file') {
                            fileList.push({
                                name: item.name,
                                url: item.download_url
                            });
                        }
                    }
                    if (fileList.length > 0) {
                        renderFileListPanel(fileList, null);
                    } else {
                        renderFileListPanel(null, 'No files found in repository.');
                    }
                } catch(e) {
                    renderFileListPanel(null, 'Failed to parse file list: ' + e.message);
                }
            } else {
                renderFileListPanel(null, 'HTTP error: ' + xhr.status + ' - Please check network or repository.');
            }
            isRefreshing = false;
            // 重新渲染后按钮自动可用（因为生成了新的按钮）
        }
    };
    xhr.onerror = function() {
        var tempMsg = document.getElementById('tempLoadingMsg');
        if (tempMsg) tempMsg.parentNode.removeChild(tempMsg);
        renderFileListPanel(null, 'Network request failed. Please check your internet connection.');
        isRefreshing = false;
    };
    xhr.send();
}

// 打开面板（初始状态显示空列表提示）
function loadAndShowFileList() {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    
    // 如果面板已经可见，则不做任何事
    if (container.style.display === 'block' && container.innerHTML !== '') {
        return;
    }
    
    container.style.display = 'block';
    // 初始渲染：无文件，无错误，显示默认提示
    renderFileListPanel(null, null);
}

// 强制下载文件（兼容老浏览器）
function forceDownload(url, filename) {
    if (window.XMLHttpRequest && window.Blob && window.URL && window.URL.createObjectURL) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'blob';
        xhr.onload = function() {
            if (xhr.status === 200) {
                var blob = xhr.response;
                var link = document.createElement('a');
                var blobUrl = window.URL.createObjectURL(blob);
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } else {
                window.location.href = url;
            }
        };
        xhr.onerror = function() {
            window.location.href = url;
        };
        xhr.send();
    } else {
        window.location.href = url;
    }
}

function downloadSelectedFile() {
    var select = document.getElementById('dynamicFileSelect');
    // 如果下拉框被禁用或者没有有效值，则提示
    if (!select || select.disabled || !select.value || select.value === '') {
        alert('No file selected. Please click Refresh to load files first.');
        return;
    }
    var fileUrl = select.value;
    var filename = fileUrl.substring(fileUrl.lastIndexOf('/') + 1);
    if (filename.indexOf('?') !== -1) {
        filename = filename.split('?')[0];
    }
    forceDownload(fileUrl, filename);
}

function closeDownloadArea() {
    var container = document.getElementById('secondaryDownloadArea');
    if (container) {
        container.style.display = 'none';
        container.innerHTML = '';
    }
}
</script>

    - 强制下载功能兼容老浏览器。
    ============================================================
-->
</body>
