<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" 
"http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    font-size: 20px;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
    background-color: #FFFFFF;
}
/* 全屏背景图片容器 - 动态切换图片 */
.bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.bg-image img {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
}
.content {
    position: relative;
    z-index: 1;
}
.search-wrapper {
    margin: 0 0 40px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
.primary-btn {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    font-size: 1.3em;
    font-weight: bold;
    cursor: pointer;
    margin: 8px 12px;
}
.primary-btn:hover {
    background-color: #DDDDDD;
}
.file-select {
    font-size: 1.2em;
    padding: 8px;
    margin: 10px;
    border: 2px solid #7F9DB9;
    background: #FFFFFF;
}
.download-submit {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 8px 24px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}
.download-submit:disabled {
    opacity: 0.5;
    cursor: default;
}
.close-btn, .refresh-btn {
    background-color: #EEEEEE;
    border: 2px solid #7F9DB9;
    color: #0000EE;
    padding: 6px 18px;
    font-size: 1em;
    cursor: pointer;
    margin: 0 8px;
}
.refresh-btn:disabled {
    opacity: 0.5;
    cursor: default;
}
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
#secondaryDownloadArea {
    margin: 20px auto;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<!-- 全屏背景图片容器 -->
<div class="bg-image" id="bgImageContainer">
    <img src="home.jpg" alt="background" id="bgImg">
</div>

<div class="content">
    <div class="search-wrapper">
        <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Google Search" id="googleSearchBtn">
        </form>
    </div>
    <div class="search-wrapper">
        <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Bing Search" id="bingSearchBtn">
        </form>
    </div>

    <div class="subtitle" id="downloadSubtitle">Download</div>
    <div>
        <button class="primary-btn" onclick="loadAndShowFileList()" id="downloadSelectedBtn">Download Selected</button>
    </div>
    <div id="secondaryDownloadArea"></div>

    <ul class="link-list">
        <li><a href="IOCN_1.jpg" class="button-link">ICON 1</a></li>
        <li><a href="IOCN_2.jpg" class="button-link">ICON 2</a></li>
        <li><a href="TOOLBOX2.vpk" class="button-link">TOOLBOX2</a></li>
        <li><a href="2025-10-02_05-17-20.mp4" class="button-link">Video TEST</a></li>
    </ul>

    <h1>links</h1>
    <ul class="link-list">
        <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
        <li><a href="https://wiki.pretendo.zip/game-support-status" class="button-link">PRETENDO STATUS</a></li>
        <li><a href="https://juxt.pretendo.network/login?redirect=/titles" class="button-link">Miiverse</a></li>
        <li><a href="https://time.is/Taiwan" class="button-link">TIME</a></li>
        <li><a href="https://mcarc.github.io/" class="button-link">mcarc</a></li>
        <li><a href="https://steamcommunity.com/id/LowMou/" class="button-link">Steam</a></li>
        <li><a href="https://hshop.erista.me/" class="button-link">HSHOP</a></li>
        <li><a href="https://id.nintendo.net/login" class="button-link">Nintendo Network</a></li>
        <li><a href="https://buff.163.com/?game=csgo" class="button-link">BUFF</a></li>
        
    </ul>
</div>

<script type="text/javascript">
// ========== 浏览器语言检测与本地化文本 ==========
var userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
var lang = 'en'; // 默认英语
if (userLang.indexOf('zh-cn') === 0 || userLang.indexOf('zh-hans') === 0 || userLang === 'zh') {
    lang = 'zh-CN';
} else if (userLang.indexOf('zh-tw') === 0 || userLang.indexOf('zh-hk') === 0 || userLang.indexOf('zh-mo') === 0 || userLang.indexOf('zh-hant') === 0) {
    lang = 'zh-TW';
} else {
    lang = 'en';
}

// 本地化文本字典
var texts = {
    'en': {
        googleSearch: 'Google Search',
        bingSearch: 'Bing Search',
        downloadTitle: 'Download',
        downloadSelectedBtn: 'Download Selected',
        selectPlaceholder: 'No files - click Refresh',
        refreshBtn: 'Refresh',
        closeListBtn: 'Close List',
        downloadBtn: 'Download',
        fetchingMsg: 'Fetching from GitHub...',
        noFilesAlert: 'No files found in the repository.',
        parseErrorAlert: 'Failed to parse file list: ',
        httpErrorAlert: 'Unable to fetch file list. HTTP error: ',
        networkErrorAlert: 'Network request failed. Please check your internet connection.',
        noFileSelectedAlert: 'No file selected. Please click Refresh to load files first.'
    },
    'zh-CN': {
        googleSearch: 'Google 搜索',
        bingSearch: 'Bing 搜索',
        downloadTitle: '下载',
        downloadSelectedBtn: '选择下载',
        selectPlaceholder: '无文件 - 点击刷新',
        refreshBtn: '刷新',
        closeListBtn: '关闭列表',
        downloadBtn: '下载',
        fetchingMsg: '正在从 GitHub 获取文件列表...',
        noFilesAlert: '仓库中没有找到文件。',
        parseErrorAlert: '解析文件列表失败：',
        httpErrorAlert: '无法获取文件列表。HTTP 错误：',
        networkErrorAlert: '网络请求失败，请检查网络连接。',
        noFileSelectedAlert: '未选择文件，请先点击“刷新”加载文件。'
    },
    'zh-TW': {
        googleSearch: 'Google 搜尋',
        bingSearch: 'Bing 搜尋',
        downloadTitle: '下載',
        downloadSelectedBtn: '選擇下載',
        selectPlaceholder: '無檔案 - 點擊重新整理',
        refreshBtn: '重新整理',
        closeListBtn: '關閉列表',
        downloadBtn: '下載',
        fetchingMsg: '正在從 GitHub 獲取檔案列表...',
        noFilesAlert: '倉庫中沒有找到檔案。',
        parseErrorAlert: '解析檔案列表失敗：',
        httpErrorAlert: '無法獲取檔案列表。HTTP 錯誤：',
        networkErrorAlert: '網路請求失敗，請檢查網路連線。',
        noFileSelectedAlert: '未選擇檔案，請先點擊「重新整理」載入檔案。'
    }
};

var t = texts[lang];

// 应用页面初始文本（搜索框、标题、按钮）
document.getElementById('googleSearchBtn').value = t.googleSearch;
document.getElementById('bingSearchBtn').value = t.bingSearch;
document.getElementById('downloadSubtitle').innerHTML = t.downloadTitle;
document.getElementById('downloadSelectedBtn').innerHTML = t.downloadSelectedBtn;

// ========== 屏幕分辨率检测与背景图片切换 ==========
// 检测是否为竖屏模式（手机竖屏）或宽度小于768px
function isMobilePortrait() {
    var width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
    var height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
    // 条件：宽度小于高度（竖屏）或者宽度小于768px（手机）
    return (width < height) || (width < 768);
}

// 切换背景图片
function switchBackgroundImage() {
    var bgImg = document.getElementById('bgImg');
    if (!bgImg) return;
    
    if (isMobilePortrait()) {
        bgImg.src = 'home2.jpg';
    } else {
        bgImg.src = 'home.jpg';
    }
}

// 监听窗口大小变化（当分辨率改变时重新检测）
if (window.addEventListener) {
    window.addEventListener('resize', function() {
        switchBackgroundImage();
    });
} else if (window.attachEvent) {
    // 兼容 IE8 及以下
    window.attachEvent('onresize', function() {
        switchBackgroundImage();
    });
}

// 页面加载时执行一次背景切换
switchBackgroundImage();

// 全局标志，防止刷新时重复点击
var isRefreshing = false;

// 渲染文件列表面板（files 为数组或 null）
function renderFileListPanel(files) {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    
    var html = '<div style="background-color: rgba(238,238,238,0.9); border: 3px solid #7F9DB9; padding: 20px; display: inline-block; min-width: 320px;">';
    
    var hasFiles = (files && files.length > 0);
    
    if (hasFiles) {
        html += '<select id="dynamicFileSelect" class="file-select" size="1">';
        for (var i = 0; i < files.length; i++) {
            var safeName = files[i].name.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            var safeUrl = files[i].url.replace(/&/g, '&amp;');
            html += '<option value="' + safeUrl + '">' + safeName + '</option>';
        }
        html += '</select>';
        html += '<button class="download-submit" onclick="downloadSelectedFile()" id="downloadBtn">' + t.downloadBtn + '</button>';
    } else {
        html += '<select id="dynamicFileSelect" class="file-select" size="1" disabled>';
        html += '<option value="">' + t.selectPlaceholder + '</option>';
        html += '</select>';
        html += '<button class="download-submit" onclick="downloadSelectedFile()" id="downloadBtn" disabled>' + t.downloadBtn + '</button>';
    }
    
    html += '<div style="margin-top: 15px;">';
    html += '<button class="refresh-btn" onclick="refreshFileListFromGitHub()" id="refreshButton">' + t.refreshBtn + '</button>';
    html += '<button class="close-btn" onclick="closeDownloadArea()">' + t.closeListBtn + '</button>';
    html += '</div>';
    html += '</div>';
    
    container.innerHTML = html;
}

// 从 GitHub 获取文件列表
function refreshFileListFromGitHub() {
    if (isRefreshing) return;
    
    var refreshBtn = document.getElementById('refreshButton');
    if (refreshBtn) {
        refreshBtn.disabled = true;
        refreshBtn.style.opacity = '0.6';
        refreshBtn.style.cursor = 'default';
    }
    isRefreshing = true;
    
    // 显示加载中提示
    var container = document.getElementById('secondaryDownloadArea');
    if (container) {
        var selectElem = document.getElementById('dynamicFileSelect');
        if (selectElem) {
            selectElem.disabled = true;
            selectElem.options.length = 0;
            var loadingOpt = document.createElement('option');
            loadingOpt.value = '';
            loadingOpt.text = t.fetchingMsg;
            selectElem.appendChild(loadingOpt);
            var downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) downloadBtn.disabled = true;
        } else {
            var loadingDiv = document.createElement('div');
            loadingDiv.id = 'tempLoadingMsg';
            loadingDiv.style.margin = '10px';
            loadingDiv.style.color = '#0000EE';
            loadingDiv.innerHTML = t.fetchingMsg;
            container.appendChild(loadingDiv);
        }
    }
    
    var apiUrl = 'https://api.github.com/repos/LowMouRen/MYNEWWEB/contents/';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', apiUrl, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            var tempMsg = document.getElementById('tempLoadingMsg');
            if (tempMsg) tempMsg.parentNode.removeChild(tempMsg);
            
            if (xhr.status === 200) {
                try {
                    var files = JSON.parse(xhr.responseText);
                    var fileList = [];
                    for (var i = 0; i < files.length; i++) {
                        var item = files[i];
                        if (item.type === 'file') {
                            fileList.push({
                                name: item.name,
                                url: item.download_url
                            });
                        }
                    }
                    if (fileList.length > 0) {
                        renderFileListPanel(fileList);
                    } else {
                        alert(t.noFilesAlert);
                        renderFileListPanel(null);
                    }
                } catch(e) {
                    alert(t.parseErrorAlert + e.message);
                    renderFileListPanel(null);
                }
            } else {
                alert(t.httpErrorAlert + xhr.status + '\nPlease check network or repository.');
                renderFileListPanel(null);
            }
            isRefreshing = false;
        }
    };
    xhr.onerror = function() {
        var tempMsg = document.getElementById('tempLoadingMsg');
        if (tempMsg) tempMsg.parentNode.removeChild(tempMsg);
        alert(t.networkErrorAlert);
        renderFileListPanel(null);
        isRefreshing = false;
    };
    xhr.send();
}

// 打开面板（初始显示空列表）
function loadAndShowFileList() {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    if (container.style.display === 'block' && container.innerHTML !== '') {
        return;
    }
    container.style.display = 'block';
    renderFileListPanel(null);
}

// 强制下载文件（兼容老浏览器）
function forceDownload(url, filename) {
    if (window.XMLHttpRequest && window.Blob && window.URL && window.URL.createObjectURL) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'blob';
        xhr.onload = function() {
            if (xhr.status === 200) {
                var blob = xhr.response;
                var link = document.createElement('a');
                var blobUrl = window.URL.createObjectURL(blob);
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } else {
                window.location.href = url;
            }
        };
        xhr.onerror = function() {
            window.location.href = url;
        };
        xhr.send();
    } else {
        window.location.href = url;
    }
}

function downloadSelectedFile() {
    var select = document.getElementById('dynamicFileSelect');
    if (!select || select.disabled || !select.value || select.value === '') {
        alert(t.noFileSelectedAlert);
        return;
    }
    var fileUrl = select.value;
    var filename = fileUrl.substring(fileUrl.lastIndexOf('/') + 1);
    if (filename.indexOf('?') !== -1) {
        filename = filename.split('?')[0];
    }
    forceDownload(fileUrl, filename);
}

function closeDownloadArea() {
    var container = document.getElementById('secondaryDownloadArea');
    if (container) {
        container.style.display = 'none';
        container.innerHTML = '';
    }
}
</script>

<!--

    GitHub 部署说明：
    1. 将此文件保存为 index.html
    2. 确保背景图片 "home.jpg" 和 "home2.jpg" 与 index.html 在同一目录
    3. 确保其他文件（IOCN_1.jpg, IOCN_2.jpg, TOOLBOX2.vpk 等）也在同一目录
    4. 启用 GitHub Pages 后访问即可
    功能：
    - 自动检测屏幕分辨率，竖屏或手机宽度(<768px)时使用 home2.jpg，否则使用 home.jpg

    - 自动检测浏览器语言（简体中文、繁体中文、英语），界面文本相应切换
    - 链接按钮保持原文不翻译
    ============================================================
-->
</body>
</html>
