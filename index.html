<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" 
"http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    font-size: 20px;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
    background-color: #FFFFFF;
}
/* 全屏背景图片 - 兼容所有古老浏览器（强制拉伸） */
.bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.bg-image img {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
}
/* 内容区域位于背景之上 */
.content {
    position: relative;
    z-index: 1;
}
/* 搜索框容器 */
.search-wrapper {
    margin: 0 0 40px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
/* 通用按钮样式 */
.primary-btn {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    font-size: 1.3em;
    font-weight: bold;
    cursor: pointer;
    margin: 8px 12px;
}
.primary-btn:hover {
    background-color: #DDDDDD;
}
/* 下拉列表样式（浏览器原生） */
.file-select {
    font-size: 1.2em;
    padding: 8px;
    margin: 10px;
    border: 2px solid #7F9DB9;
    background: #FFFFFF;
}
.download-submit {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 8px 24px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}
/* 网址列表 */
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.button-link:visited {
    color: #551A8B;
}
/* 小标题样式 */
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
/* 二级菜单容器（初始隐藏） */
#secondaryDownloadArea {
    margin: 20px auto;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<!-- 全屏背景图片 -->
<div class="bg-image">
    <img src="home.jpg" alt="background">
</div>

<div class="content">
    <!-- 搜索框1：Google 搜索 -->
    <div class="search-wrapper">
        <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Google Search">
        </form>
    </div>

    <!-- 搜索框2：Bing 搜索 -->
    <div class="search-wrapper">
        <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="  bing  Search  ">
        </form>
    </div>

    <!-- Download 小标题 -->
    <div class="subtitle">Download</div>

    <!-- 主按钮：点击后显示二级菜单并实时获取文件列表 -->
    <div>
        <button class="primary-btn" onclick="loadAndShowFileList()">Download Selected</button>
    </div>

    <!-- 二级菜单容器（用于动态显示文件列表和下载控件） -->
    <div id="secondaryDownloadArea"></div>

    <!-- 原有的 ICON 按钮列表（保留） -->
    <ul class="link-list">
        <li><a href="IOCN_1.jpg" class="button-link">ICON 1</a></li>
        <li><a href="IOCN_2.jpg" class="button-link">ICON 2</a></li>
        <li><a href="https://lowmouren.github.io/MYNEWWEB/TOOLBOX2.vpk" class="button-link">TOOLBOX2</a></li>
    </ul>

    <!-- 小标题 links -->
    <h1>links</h1>

    <!-- 外部链接列表 -->
    <ul class="link-list">
        <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
        <li><a href="https://wiki.pretendo.zip/game-support-status" class="button-link">PRETENDO STATUS</a></li>
        <li><a href="https://juxt.pretendo.network/login?redirect=/titles" class="button-link">Miiverse</a></li>
        <li><a href="https://time.is/Taiwan" class="button-link">TIME</a></li>
    </ul>
</div>

<script type="text/javascript">
// 模拟实时获取文件列表（实际可从服务器获取 JSON）
// 为了演示，这里定义了一个静态数组，但通过 setTimeout 模拟异步请求，体现“实时获取”
// 您也可以替换为 XMLHttpRequest 从服务器加载文件列表（例如 files.json）
function fetchFileList(callback) {
    // 模拟网络请求延迟（体现实时获取）
    setTimeout(function() {
        // 文件列表数据：包含名称和路径/URL
        var files = [
            { name: "IOCN_1.jpg", url: "IOCN_1.jpg" },
            { name: "IOCN_2.jpg", url: "IOCN_2.jpg" },
            { name: "TOOLBOX2.vpk", url: "https://lowmouren.github.io/MYNEWWEB/TOOLBOX2.vpk" }
        ];
        callback(files);
    }, 100); // 模拟100ms延迟，体现动态加载
    // 如果需要真正的实时从服务器获取，可以取消下面的注释，并准备一个 files.json 文件
    /*
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'files.json', true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState == 4 && xhr.status == 200) {
            var files = JSON.parse(xhr.responseText);
            callback(files);
        }
    };
    xhr.send();
    */
}

// 主函数：点击主按钮后，显示二级菜单，并动态生成文件列表控件
function loadAndShowFileList() {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    
    // 显示二级菜单区域（先清空并显示加载提示）
    container.style.display = 'block';
    container.innerHTML = '<div style="margin: 10px;">Loading file list...</div>';
    
    // 实时获取文件列表
    fetchFileList(function(files) {
        if (!files || files.length === 0) {
            container.innerHTML = '<div>No files available.</div>';
            return;
        }
        
        // 构建下拉列表和下载按钮
        var html = '<div style="background-color: rgba(238,238,238,0.9); border: 3px solid #7F9DB9; padding: 20px; display: inline-block; min-width: 300px;">';
        html += '<select id="dynamicFileSelect" class="file-select" size="1">';
        for (var i = 0; i < files.length; i++) {
            html += '<option value="' + escapeHtml(files[i].url) + '">' + escapeHtml(files[i].name) + '</option>';
        }
        html += '</select>';
        html += '<button class="download-submit" onclick="downloadSelectedFile()">Download</button>';
        html += '</div>';
        container.innerHTML = html;
    });
}

// 下载选中的文件
function downloadSelectedFile() {
    var select = document.getElementById('dynamicFileSelect');
    if (select && select.value) {
        window.location.href = select.value;
    }
}

// 辅助函数：防止XSS（简单转义）
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>

    如需真正的动态列表，可修改 fetchFileList 函数，改为从服务器读取 JSON 文件。
    ============================================================
-->
</body>
</html>
