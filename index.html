<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
/* 无任何现代布局、圆角、阴影、动画、弹性或网格 */
body {
    background: #FFFFFF;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    margin: 24px 16px;
    padding: 0;
}
/* 搜索框容器：使用 HTML align="center" 保证 IE5+ 完美居中 */
.search-wrapper {
    margin: 0 0 20px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 0.9em;
}
input[type="text"] {
    border: 1px solid #7F9DB9;
    width: 280px;          /* 固定宽度，两个搜索框保持一致 */
    padding: 3px;
    margin: 0 6px 0 0;
    background: #FFFFFF;
}
input[type="submit"] {
    border: 1px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 3px 10px;
}
/* 下载区域（极简，居中） */
.download-area {
    margin: 20px 0 20px 0;
    text-align: center;
}
/* 网址列表 —— 简单水平排列，自动换行，无项目符号 */
.link-list {
    margin: 20px 0 0 0;
    padding: 0;
    list-style-type: none;
}
.link-list li {
    display: inline;          /* 水平排列，古老浏览器完美支持 */
    margin-right: 14px;      /* 链接之间的简单间隔 */
    white-space: nowrap;     /* 每个链接文本不换行，整体自然换行 */
}
/* 链接保持传统蓝紫配色，无悬停特效，仅下划线 */
a:link {
    color: #0000EE;
    text-decoration: underline;
}
a:visited {
    color: #551A8B;
    text-decoration: underline;
}
a:hover {
    text-decoration: underline;
}
/* 无浮动、无定位、无任何多余修饰 */
</style>
</head>
<body>

<!-- 无彩色 Google 标题（已按要求移除） -->

<!-- 搜索框1：Google 搜索（居中） -->
<div align="center" class="search-wrapper">
    <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Google Search">
    </form>
</div>

<!-- 搜索框2：Bing 搜索（居中，与 Google 搜索框宽度一致） -->
<div align="center" class="search-wrapper">
    <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Bing Search">
    </form>
</div>

</ul>
