<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
html, body {

}
body {

    text-align: center;

}
/* 全屏背景图片 */

.content {

/* 搜索框 */
.search-wrapper {

    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
/* 按钮样式 */
.primary-btn {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    font-size: 1.3em;
    font-weight: bold;
    cursor: pointer;
    margin: 8px 12px;
}
.primary-btn:hover {
    background-color: #DDDDDD;
}
.file-select {
    font-size: 1.2em;
    padding: 8px;
    margin: 10px;
    border: 2px solid #7F9DB9;
    background: #FFFFFF;
}
.download-submit {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 8px 24px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}
.close-btn {
    background-color: #EEEEEE;
    border: 2px solid #7F9DB9;
    color: #0000EE;
    padding: 6px 18px;
    font-size: 1em;
    cursor: pointer;
    margin-top: 15px;
}
/* 链接按钮 */
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
#secondaryDownloadArea {
    margin: 20px auto;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<div class="bg-image">

<div class="content">
    <!-- 搜索框1：Google 搜索 -->

        <li><a href="IOCN_2.jpg" class="button-link">ICON 2</a></li>

    <h1>links</h1>
    <ul class="link-list">
        <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
        <li><a href="https://wiki.pretendo.zip/game-support-status" class="button-link">PRETENDO STATUS</a></li>
        <li><a href="https://juxt.pretendo.network/login?redirect=/titles" class="button-link">Miiverse</a></li>
        <li><a href="https://time.is/Taiwan" class="button-link">TIME</a></li>
    </ul>
</div>

<script type="text/javascript">
// 从 GitHub 仓库获取文件列表（使用 GitHub API）
function fetchFileListFromGitHub(callback) {
    var apiUrl = 'https://api.github.com/repos/LowMouRen/MYNEWWEB/contents/';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', apiUrl, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var files = JSON.parse(xhr.responseText);
                    var fileList = [];
                    for (var i = 0; i < files.length; i++) {
                        var item = files[i];
                        // 只显示文件（type === 'file'），忽略目录
                        if (item.type === 'file') {
                            fileList.push({
                                name: item.name,
                                url: item.download_url
                            });
                        }
                    }
                    callback(null, fileList);
                } catch(e) {
                    callback('Failed to parse file list: ' + e.message, null);
                }
            } else {
                callback('Unable to fetch file list. HTTP error: ' + xhr.status, null);
            }
        }
    };
    xhr.onerror = function() {
        callback('Network request failed. Please check network or repository address.', null);
    };
    xhr.send();
}

// 主函数：点击主按钮后显示二级菜单并加载文件列表
function loadAndShowFileList() {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    
    // 显示区域并清空内容，显示加载提示
    container.style.display = 'block';
    container.innerHTML = '<div style="margin: 10px;">Fetching file list from repository...</div>';
    
    fetchFileListFromGitHub(function(error, files) {
        if (error) {
            container.innerHTML = '<div style="color: red; margin: 10px;">Error: ' + error + '</div>' +
                                  '<button class="close-btn" onclick="closeDownloadArea()">Close</button>';
            return;
        }
        if (!files || files.length === 0) {
            container.innerHTML = '<div>No files found in repository.</div>' +
                                  '<button class="close-btn" onclick="closeDownloadArea()">Close</button>';
            return;
        }
        
        // 构建下拉列表 + 下载按钮 + 关闭按钮
        var html = '<div style="background-color: rgba(238,238,238,0.9); border: 3px solid #7F9DB9; padding: 20px; display: inline-block; min-width: 320px;">';
        html += '<select id="dynamicFileSelect" class="file-select" size="1">';
        for (var i = 0; i < files.length; i++) {
            var safeName = files[i].name.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            var safeUrl = files[i].url.replace(/&/g, '&amp;');
            html += '<option value="' + safeUrl + '">' + safeName + '</option>';
        }
        html += '</select>';
        html += '<button class="download-submit" onclick="downloadSelectedFile()">Download</button>';
        html += '<div style="margin-top: 15px;"><button class="close-btn" onclick="closeDownloadArea()">Close List</button></div>';
        html += '</div>';
        container.innerHTML = html;
    });
}

// 下载选中的文件
function downloadSelectedFile() {
    var select = document.getElementById('dynamicFileSelect');
    if (select && select.value) {
        window.location.href = select.value;
    } else {
        alert('Please select a file first.');
    }
}

// 关闭二级菜单区域
function closeDownloadArea() {
    var container = document.getElementById('secondaryDownloadArea');
    if (container) {
        container.style.display = 'none';
        container.innerHTML = '';
    }
}
</script>
