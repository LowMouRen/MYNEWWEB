<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"

<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    font-size: 20px;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
    background-color: #FFFFFF;
}
.bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.bg-image img {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
}
.content {
    position: relative;
    z-index: 1;
}
.search-wrapper {
    margin: 0 0 40px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
.primary-btn {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    font-size: 1.3em;
    font-weight: bold;
    cursor: pointer;
    margin: 8px 12px;
}
.primary-btn:hover {
    background-color: #DDDDDD;
}
.file-select {
    font-size: 1.2em;
    padding: 8px;
    margin: 10px;
    border: 2px solid #7F9DB9;
    background: #FFFFFF;
}
.download-submit {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 8px 24px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}
.close-btn, .refresh-btn {
    background-color: #EEEEEE;
    border: 2px solid #7F9DB9;
    color: #0000EE;
    padding: 6px 18px;
    font-size: 1em;
    cursor: pointer;
    margin: 0 8px;
}
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
#secondaryDownloadArea {
    margin: 20px auto;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<div class="bg-image">
    <img src="home.jpg" alt="background">
</div>

<div class="content">
    <div class="search-wrapper">
        <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Google Search">
        </form>
    </div>
    <div class="search-wrapper">
        <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Bing Search">
        </form>
    </div>

    <div class="subtitle">Download</div>
    <div>
        <button class="primary-btn" onclick="loadAndShowFileList()">Download Selected</button>
    </div>
    <div id="secondaryDownloadArea"></div>

    <ul class="link-list">
        <li><a href="IOCN_1.jpg" class="button-link">ICON 1</a></li>
        <li><a href="IOCN_2.jpg" class="button-link">ICON 2</a></li>
        <li><a href="https://lowmouren.github.io/MYNEWWEB/TOOLBOX2.vpk" class="button-link">TOOLBOX2</a></li>
    </ul>

    <h1>links</h1>
    <ul class="link-list">
        <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
        <li><a href="https://wiki.pretendo.zip/game-support-status" class="button-link">PRETENDO STATUS</a></li>
        <li><a href="https://juxt.pretendo.network/login?redirect=/titles" class="button-link">Miiverse</a></li>
        <li><a href="https://time.is/Taiwan" class="button-link">TIME</a></li>
    </ul>
</div>

<script type="text/javascript">
// ========== 静态文件列表（后备列表，确保立即显示）==========
var staticFileList = [
    { name: "IOCN_1.jpg", url: "IOCN_1.jpg" },
    { name: "IOCN_2.jpg", url: "IOCN_2.jpg" },
    { name: "TOOLBOX2.vpk", url: "https://lowmouren.github.io/MYNEWWEB/TOOLBOX2.vpk" }
];

// 当前正在使用的文件列表（默认为静态列表，刷新后会更新）
var currentFileList = staticFileList.slice();

// 从 GitHub API 获取最新文件列表并更新下拉菜单
function refreshFileListFromGitHub() {
    var selectElem = document.getElementById('dynamicFileSelect');
    if (!selectElem) {
        loadAndShowFileList(true);
        return;
    }
    
    var parent = selectElem.parentNode;
    var msgDiv = document.createElement('div');
    msgDiv.id = 'refreshStatusMsg';
    msgDiv.style.margin = '10px';
    msgDiv.innerHTML = 'Updating from GitHub...';
    parent.appendChild(msgDiv);
    
    var apiUrl = 'https://api.github.com/repos/LowMouRen/MYNEWWEB/contents/';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', apiUrl, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            var msgDivElem = document.getElementById('refreshStatusMsg');
            if (msgDivElem) msgDivElem.parentNode.removeChild(msgDivElem);
            
            if (xhr.status === 200) {
                try {
                    var files = JSON.parse(xhr.responseText);
                    var newList = [];
                    for (var i = 0; i < files.length; i++) {
                        var item = files[i];
                        if (item.type === 'file') {
                            newList.push({
                                name: item.name,
                                url: item.download_url
                            });
                        }
                    }
                    if (newList.length > 0) {
                        currentFileList = newList;
                        var select = document.getElementById('dynamicFileSelect');
                        if (select) {
                            while (select.options.length > 0) {
                                select.remove(0);
                            }
                            for (var j = 0; j < currentFileList.length; j++) {
                                var option = document.createElement('option');
                                option.value = currentFileList[j].url;
                                option.text = currentFileList[j].name;
                                select.appendChild(option);
                            }
                            var successMsg = document.createElement('div');
                            successMsg.style.margin = '10px';
                            successMsg.style.color = 'green';
                            successMsg.innerHTML = 'List refreshed successfully!';
                            select.parentNode.appendChild(successMsg);
                            setTimeout(function() { successMsg.parentNode.removeChild(successMsg); }, 2000);
                        }
                    } else {
                        alert('No files found in repository.');
                    }
                } catch(e) {
                    alert('Failed to parse file list: ' + e.message);
                }
            } else {
                alert('Unable to fetch file list. HTTP error: ' + xhr.status + '\nPlease check network or try again later.');
            }
        }
    };
    xhr.onerror = function() {
        var msgDivElem = document.getElementById('refreshStatusMsg');
        if (msgDivElem) msgDivElem.parentNode.removeChild(msgDivElem);
        alert('Network request failed. Please check your internet connection.');
    };
    xhr.send();
}

// 显示文件列表面板
function loadAndShowFileList() {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    
    if (container.style.display === 'block' && container.innerHTML !== '') {
        return;
    }
    
    container.style.display = 'block';
    
    if (!currentFileList || currentFileList.length === 0) {
        container.innerHTML = '<div>No files available.</div>' +
                              '<button class="close-btn" onclick="closeDownloadArea()">Close List</button>';
        return;
    }
    
    var html = '<div style="background-color: rgba(238,238,238,0.9); border: 3px solid #7F9DB9; padding: 20px; display: inline-block; min-width: 320px;">';
    html += '<select id="dynamicFileSelect" class="file-select" size="1">';
    for (var i = 0; i < currentFileList.length; i++) {
        var safeName = currentFileList[i].name.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
        var safeUrl = currentFileList[i].url.replace(/&/g, '&amp;');
        html += '<option value="' + safeUrl + '">' + safeName + '</option>';
    }
    html += '</select>';
    html += '<button class="download-submit" onclick="downloadSelectedFile()">Download</button>';
    html += '<div style="margin-top: 15px;">';
    html += '<button class="refresh-btn" onclick="refreshFileListFromGitHub()">Refresh</button>';
    html += '<button class="close-btn" onclick="closeDownloadArea()">Close List</button>';
    html += '</div>';
    html += '</div>';
    container.innerHTML = html;
}

// 强制下载文件
function forceDownload(url, filename) {
    if (window.XMLHttpRequest && window.Blob && window.URL && window.URL.createObjectURL) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'blob';
        xhr.onload = function() {
            if (xhr.status === 200) {
                var blob = xhr.response;
                var link = document.createElement('a');
                var blobUrl = window.URL.createObjectURL(blob);
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } else {
                window.location.href = url;
            }
        };
        xhr.onerror = function() {
            window.location.href = url;
        };
        xhr.send();
    } else {
        window.location.href = url;
    }
}

function downloadSelectedFile() {
    var select = document.getElementById('dynamicFileSelect');
    if (select && select.value) {
        var fileUrl = select.value;
        var filename = fileUrl.substring(fileUrl.lastIndexOf('/') + 1);
        if (filename.indexOf('?') !== -1) {
            filename = filename.split('?')[0];
        }
        forceDownload(fileUrl, filename);
    } else {
        alert('Please select a file first.');
    }
}

function closeDownloadArea() {
    var container = document.getElementById('secondaryDownloadArea');
    if (container) {
        container.style.display = 'none';
        container.innerHTML = '';
    }
}
</script>

<!-- 
    ============================================================
    GitHub 部署说明：
    1. 将此文件保存为 index.html
    2. 确保背景图片 "home.jpg" 与 index.html 在同一目录
    3. 确保 "IOCN_1.jpg", "IOCN_2.jpg" 也在同一目录
    4. 启用 GitHub Pages 后访问即可
    功能：
    - 默认使用静态文件列表（快速显示）
    - 点击 "Refresh" 按钮从仓库实时获取最新文件列表并更新下拉菜单
    - 强制下载功能兼容老浏览器
    ============================================================
-->
</body>
</html>
