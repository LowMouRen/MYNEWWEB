<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
body {
    background: #FFFFFF;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    margin: 24px 16px;
    padding: 0;
    text-align: center;     /* 全局居中，所有块级内容自动居中（古老浏览器也支持） */
}
/* 搜索框容器不需要额外设置，全局居中已生效，但保留原有结构以防覆盖 */
.search-wrapper {
    margin: 0 0 20px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 0.9em;
}
input[type="text"] {
    border: 1px solid #7F9DB9;
    width: 280px;
    padding: 3px;
    margin: 0 6px 0 0;
    background: #FFFFFF;
}
input[type="submit"] {
    border: 1px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 3px 10px;
}
/* 网址列表 —— 水平排列并居中 */
.link-list {
    margin: 20px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;     /* 使列表内容居中 */
}
.link-list li {
    display: inline;        /* 水平排列 */
    margin-right: 14px;     /* 链接间隔 */
    white-space: nowrap;
}
/* 最后一个 li 的右边距可以去掉（非必要，不影响美观） */
/* 链接样式保持传统 */
a:link {
    color: #0000EE;
    text-decoration: underline;
}
a:visited {
    color: #551A8B;
    text-decoration: underline;
}
a:hover {
    text-decoration: underline;
}
/* 标题居中 */
h1 {
    text-align: center;
    margin: 20px 0 10px 0;
    font-size: 1.4em;
    font-weight: normal;
}
</style>
</head>
<body>

<!-- 搜索框1：Google 搜索 -->
<div class="search-wrapper">
    <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Google Search">
    </form>
</div>

<!-- 搜索框2：Bing 搜索 -->
<div class="search-wrapper">
    <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Bing Search">
    </form>
</div>

<!-- ICON 图片下载链接（居中） -->
<ul class="link-list">
    <li><a href="IOCN_1.jpg">ICON</a></li>
</ul>

<!-- 小标题 links -->
<h1>links</h1>

<!-- 外部链接列表（居中） -->
<ul class="link-list">
    <li><a href="http://jailbreak.psp2.dev/" target="_blank">UNLOCK VITA</a></li>
</ul>

<!-- 
    ============================================================
    GitHub 部署说明：
    1. 将此文件保存为 index.html
    2. 确保图片文件 "IOCN 1.jpg" 与 index.html 在同一目录（根目录）
    3. 在 GitHub 上创建一个仓库（例如 my-nav）
    4. 上传这两个文件到仓库根目录
    5. 启用 GitHub Pages（Settings → Pages → Branch: main）
    6. 访问 https://你的用户名.github.io/仓库名/ 即可
    本页面无任何外部依赖，无脚本，完美兼容所有古老浏览器。
    ============================================================
-->
</body>
</html>
