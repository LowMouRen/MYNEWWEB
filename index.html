<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
/* 全局重置 */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    /* 移除原有背景样式，改用 img 标签实现全屏拉伸 */
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    font-size: 20px;
    padding: 40px 20px;
    /* 确保 body 内容在背景图片之上 */
    position: relative;
    z-index: 1;
    background-color: #FFFFFF; /* 后备背景色 */
}
/* 全屏背景图片 - 兼容所有古老浏览器（强制拉伸） */
.bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.bg-image img {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
}
/* 内容区域位于背景之上 */
.content {
    position: relative;
    z-index: 1;
}
/* 搜索框容器 */
.search-wrapper {
    margin: 0 0 40px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
/* 按钮样式（链接转按钮） */
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.button-link:visited {
    color: #551A8B;
}
/* 网址列表 */
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
/* 小标题样式 */
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
/* 主标题 */
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
</style>
</head>
<body>

<!-- 全屏背景图片：强制拉伸填满整个窗口，兼容所有古老浏览器 -->
<div class="bg-image">
    <img src="home.jpg" alt="background">
</div>

<!-- 页面主要内容 -->
<div class="content">
    <!-- 搜索框1：Google 搜索 -->
    <div class="search-wrapper">
        <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Google Search">
        </form>
    </div>

    <!-- 搜索框2：Bing 搜索 -->
    <div class="search-wrapper">
        <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="  bing  Search  ">
        </form>
    </div>

    <!-- Download 小标题 -->
    <div class="subtitle">Download</div>

    <!-- ICON 图片下载链接（按钮样式） -->
    <ul class="link-list">
        <li><a href="IOCN_1.jpg" class="button-link">ICON 1</a></li>
        <li><a href="IOCN_2.jpg" class="button-link">ICON 2</a></li>
        <li><a href="https://lowmouren.github.io/MYNEWWEB/TOOLBOX2.vpk" class="button-link">TOOLBOX2</a></li>
    </ul>

    <!-- 小标题 links -->
    <h1>links</h1>

    <!-- 外部链接列表（按钮样式） -->
    <ul class="link-list">
        <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
        <li><a href="https://wiki.pretendo.zip/game-support-status" class="button-link">PRETENDO STATUS</a></li>
        <li><a href="https://juxt.pretendo.network/login?redirect=/titles" class="button-link">Miiverse</a></li>
    </ul>
</div>

<!-- 
    ============================================================
    GitHub 部署说明：
    1. 将此文件保存为 index.html
    2. 确保图片文件 "home.jpg" 与 index.html 在同一目录（根目录）
    3. 确保 "IOCN_1.jpg", "IOCN_2.jpg" 也在同一目录
    4. 在 GitHub 上创建仓库并上传所有文件
    5. 启用 GitHub Pages（Settings → Pages → Branch: main）
    6. 访问 https://你的用户名.github.io/仓库名/
    本页面背景图片通过 img 标签拉伸全屏，完美兼容所有古老浏览器。
    ============================================================
-->
</body>
</html>
