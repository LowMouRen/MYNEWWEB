<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
/* 确保 html 和 body 高度100%，背景覆盖全屏 */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    /* 背景图片：home.jpg（与 index.html 同一目录） */
    background-image: url('home.jpg');
    /* 覆盖全屏，对于支持 background-size 的浏览器 */
    background-size: cover;
    /* 居中对齐，防止图片变形 */
    background-position: center center;
    /* 不重复 */
    background-repeat: no-repeat;
    /* 固定背景，滚动时背景不动（可选） */
    background-attachment: fixed;
    
    /* 以下为原有样式，保持文字居中 */
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    font-size: 20px;
    
    /* 为了背景图片完全显示，给内容区域增加内边距，同时保证内容可读 */
    padding: 40px 20px;
    /* 确保背景覆盖整个视口，即使内容不足 */
    min-height: 100%;
    /* 古老浏览器回退：如果 cover 不支持，背景居中且不重复，背景色作为后备 */
    background-color: #FFFFFF;
}
/* 针对不支持 background-size: cover 的古老浏览器（如 IE8 及以下），使用滤镜或简单居中 */
/* 注：IE6/7 也不支持 cover，但会正常显示居中背景图片，可能无法铺满全屏，但已是最佳兼容方案 */

/* 搜索框容器 */
.search-wrapper {
    margin: 0 0 40px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
/* 按钮样式（链接转按钮） */
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.button-link:visited {
    color: #551A8B;
}
/* 网址列表 */
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
/* 小标题样式 */
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
/* 主标题 */
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
</style>
</head>
<body>

<!-- 搜索框1：Google 搜索 -->
<div class="search-wrapper">
    <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Google Search">
    </form>
</div>

<!-- 搜索框2：Bing 搜索 -->
<div class="search-wrapper">
    <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Bing Search">
    </form>
</div>

<!-- Download 小标题 -->
<div class="subtitle">Download</div>

<!-- ICON 图片下载链接（按钮样式） -->
<ul class="link-list">
    <li><a href="IOCN_1.jpg" class="button-link">ICON</a></li>
</ul>

<!-- 小标题 links -->
<h1>links</h1>

<!-- 外部链接列表（按钮样式） -->
<ul class="link-list">
    <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
    <li><a href="#" class="button-link">Link 1</a></li>
    <li><a href="#" class="button-link">Link 2</a></li>
    <li><a href="#" class="button-link">Link 3</a></li>
    <li><a href="#" class="button-link">Link 4</a></li>
    <li><a href="#" class="button-link">Link 5</a></li>
    <li><a href="#" class="button-link">Link 6</a></li>
</ul>

    GitHub 部署说明：
    1. 将此文件保存为 index.html
    2. 确保图片文件 "home.jpg" 与 index.html 在同一目录（根目录）
    3. 确保 "IOCN_1.jpg" 也在同一目录
    4. 在 GitHub 上创建仓库并上传所有文件
    5. 启用 GitHub Pages（Settings → Pages → Branch: main）
    6. 访问 https://你的用户名.github.io/仓库名/
    本页面背景图片自动适应全屏，兼容古老浏览器。
    ============================================================
-->
</body>
</html>
