<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" 
"http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    font-size: 20px;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
    background-color: #FFFFFF;
}
/* 全屏背景图片 - 保持比例覆盖全屏，不拉伸变形 */
.bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
}
.bg-image img {
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
/* 兼容不支持 transform 的古老浏览器（IE8 及以下） */
@media \0screen\,screen\9 {
    .bg-image img {
        top: 0;
        left: 0;
        transform: none;
    }
}
.content {
    position: relative;
    z-index: 1;
}
/* 搜索框 */
.search-wrapper {
    margin: 0 0 40px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.2em;
}
input[type="text"] {
    border: 3px solid #7F9DB9;
    width: 400px;
    padding: 12px 10px;
    margin: 0 12px 0 0;
    background: #FFFFFF;
    font-size: 1.2em;
}
input[type="submit"] {
    border: 3px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 12px 24px;
    font-size: 1.2em;
    font-weight: bold;
}
/* 按钮样式 */
.primary-btn {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    font-size: 1.3em;
    font-weight: bold;
    cursor: pointer;
    margin: 8px 12px;
}
.primary-btn:hover {
    background-color: #DDDDDD;
}
.file-select {
    font-size: 1.2em;
    padding: 8px;
    margin: 10px;
    border: 2px solid #7F9DB9;
    background: #FFFFFF;
}
.download-submit {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 8px 24px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}
.close-btn {
    background-color: #EEEEEE;
    border: 2px solid #7F9DB9;
    color: #0000EE;
    padding: 6px 18px;
    font-size: 1em;
    cursor: pointer;
    margin-top: 15px;
}
/* 链接按钮 */
.button-link {
    background-color: #EEEEEE;
    border: 3px solid #7F9DB9;
    color: #0000EE;
    padding: 12px 28px;
    text-decoration: none;
    display: inline-block;
    margin: 8px 12px;
    font-size: 1.3em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    font-weight: bold;
}
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.link-list {
    margin: 30px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;
    margin: 0;
    white-space: nowrap;
}
.subtitle {
    text-align: center;
    margin: 30px 0 12px 0;
    font-size: 1.6em;
    font-weight: normal;
}
h1 {
    text-align: center;
    margin: 40px 0 24px 0;
    font-size: 2.2em;
    font-weight: normal;
}
#secondaryDownloadArea {
    margin: 20px auto;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<div class="bg-image">
    <img src="home.jpg" alt="background">
</div>

<div class="content">
    <div class="search-wrapper">
        <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Google Search">
        </form>
    </div>
    <div class="search-wrapper">
        <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
            <input type="text" name="q" size="30">
            <input type="submit" value="Bing Search">
        </form>
    </div>

    <div class="subtitle">Download</div>
    <div>
        <button class="primary-btn" onclick="loadAndShowFileList()">Download Selected</button>
    </div>
    <div id="secondaryDownloadArea"></div>

    <ul class="link-list">
        <li><a href="IOCN_1.jpg" class="button-link">ICON 1</a></li>
        <li><a href="IOCN_2.jpg" class="button-link">ICON 2</a></li>
        <li><a href="https://lowmouren.github.io/MYNEWWEB/TOOLBOX2.vpk" class="button-link">TOOLBOX2</a></li>
    </ul>

    <h1>links</h1>
    <ul class="link-list">
        <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
        <li><a href="https://wiki.pretendo.zip/game-support-status" class="button-link">PRETENDO STATUS</a></li>
        <li><a href="https://juxt.pretendo.network/login?redirect=/titles" class="button-link">Miiverse</a></li>
        <li><a href="https://time.is/Taiwan" class="button-link">TIME</a></li>
    </ul>
</div>

<script type="text/javascript">
// 从 GitHub 仓库获取文件列表
function fetchFileListFromGitHub(callback) {
    var apiUrl = 'https://api.github.com/repos/LowMouRen/MYNEWWEB/contents/';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', apiUrl, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var files = JSON.parse(xhr.responseText);
                    var fileList = [];
                    for (var i = 0; i < files.length; i++) {
                        var item = files[i];
                        if (item.type === 'file') {
                            fileList.push({
                                name: item.name,
                                url: item.download_url
                            });
                        }
                    }
                    callback(null, fileList);
                } catch(e) {
                    callback('Failed to parse file list: ' + e.message, null);
                }
            } else {
                callback('Unable to fetch file list. HTTP error: ' + xhr.status, null);
            }
        }
    };
    xhr.onerror = function() {
        callback('Network request failed.', null);
    };
    xhr.send();
}

function loadAndShowFileList() {
    var container = document.getElementById('secondaryDownloadArea');
    if (!container) return;
    
    container.style.display = 'block';
    container.innerHTML = '<div style="margin: 10px;">Fetching file list from repository...</div>';
    
    fetchFileListFromGitHub(function(error, files) {
        if (error) {
            container.innerHTML = '<div style="color: red; margin: 10px;">Error: ' + error + '</div>' +
                                  '<button class="close-btn" onclick="closeDownloadArea()">Close</button>';
            return;
        }
        if (!files || files.length === 0) {
            container.innerHTML = '<div>No files found in repository.</div>' +
                                  '<button class="close-btn" onclick="closeDownloadArea()">Close</button>';
            return;
        }
        
        var html = '<div style="background-color: rgba(238,238,238,0.9); border: 3px solid #7F9DB9; padding: 20px; display: inline-block; min-width: 320px;">';
        html += '<select id="dynamicFileSelect" class="file-select" size="1">';
        for (var i = 0; i < files.length; i++) {
            var safeName = files[i].name.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            var safeUrl = files[i].url.replace(/&/g, '&amp;');
            html += '<option value="' + safeUrl + '">' + safeName + '</option>';
        }
        html += '</select>';
        html += '<button class="download-submit" onclick="downloadSelectedFile()">Download</button>';
        html += '<div style="margin-top: 15px;"><button class="close-btn" onclick="closeDownloadArea()">Close List</button></div>';
        html += '</div>';
        container.innerHTML = html;
    });
}

// 检测是否支持强制下载（Blob + createObjectURL）
function supportsForceDownload() {
    return window.Blob && window.URL && typeof window.URL.createObjectURL === 'function';
}

// 强制下载（现代浏览器）或回退到直接跳转（古老浏览器）
function downloadFile(url, filename) {
    if (supportsForceDownload()) {
        // 现代浏览器：使用 Blob 方式强制下载
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'blob';
        xhr.onload = function() {
            if (xhr.status === 200) {
                var blob = xhr.response;
                var link = document.createElement('a');
                var blobUrl = window.URL.createObjectURL(blob);
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } else {
                alert('Download failed (HTTP ' + xhr.status + '). Falling back to direct link.');
                window.location.href = url;
            }
        };
        xhr.onerror = function() {
            alert('Network error. Falling back to direct link.');
            window.location.href = url;
        };
        xhr.send();
    } else {
        // 古老浏览器回退：直接跳转，用户可右键另存为
        window.location.href = url;
    }
}

function downloadSelectedFile() {
    var select = document.getElementById('dynamicFileSelect');
    if (select && select.value) {
        var fileUrl = select.value;
        var filename = fileUrl.substring(fileUrl.lastIndexOf('/') + 1);
        if (filename.indexOf('?') !== -1) {
            filename = filename.split('?')[0];
        }
        downloadFile(fileUrl, filename);
    } else {
        alert('Please select a file first.');
    }
}

function closeDownloadArea() {
    var container = document.getElementById('secondaryDownloadArea');
    if (container) {
        container.style.display = 'none';
        container.innerHTML = '';
    }
}
</script>

<!-- 
    部署说明：
    1. 保存为 index.html
    2. 确保 home.jpg, IOCN_1.jpg, IOCN_2.jpg 在同一目录
    3. GitHub Pages 启用后访问
    本页面兼容古老浏览器，Download Selected 功能在不支持 Blob 的浏览器中会自动回退到普通链接跳转。
-->
