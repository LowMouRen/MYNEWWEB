<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hello World</title>
<style type="text/css">
/* ========== 极简样式 · 完美兼容古老浏览器 ========== */
body {
    background: #FFFFFF;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    margin: 30px 20px;
    padding: 0;
    text-align: center;     /* 全局居中 */
    font-size: 16px;        /* 基础字体调大 */
}
/* 搜索框容器 */
.search-wrapper {
    margin: 0 0 28px 0;
    padding: 0;
}
.search-form {
    margin: 0;
    padding: 0;
}
input, button {
    font-family: inherit;
    font-size: 1.1em;       /* 输入框字体加大 */
}
input[type="text"] {
    border: 2px solid #7F9DB9;
    width: 320px;           /* 更宽 */
    padding: 8px 6px;
    margin: 0 8px 0 0;
    background: #FFFFFF;
    font-size: 1.1em;
}
input[type="submit"] {
    border: 2px solid #7F9DB9;
    background: #EEEEEE;
    cursor: pointer;
    padding: 8px 16px;
    font-size: 1.1em;
    font-weight: bold;
}
/* 按钮样式 —— 用于所有链接（将链接变成按钮） */
.button-link {
    background-color: #EEEEEE;
    border: 2px solid #7F9DB9;
    color: #0000EE;
    padding: 8px 18px;
    text-decoration: none;      /* 去掉下划线更像按钮 */
    display: inline-block;
    margin: 4px 6px;
    font-size: 1.1em;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
}
/* 按钮的访问/悬停保持传统，悬停可稍改变背景（可选，不加特效也ok） */
.button-link:hover {
    background-color: #DDDDDD;
    text-decoration: none;
}
.button-link:visited {
    color: #551A8B;
}
/* 网址列表 —— 水平排列居中，每个列表项内的链接都变成按钮 */
.link-list {
    margin: 24px 0 0 0;
    padding: 0;
    list-style-type: none;
    text-align: center;
}
.link-list li {
    display: inline;        /* 水平排列 */
    margin: 0;
    white-space: nowrap;
}
/* 标题放大 */
h1 {
    text-align: center;
    margin: 28px 0 16px 0;
    font-size: 1.8em;
    font-weight: normal;
}
/* 单独调整 ICON 可能出现的额外间隔 */
</style>
</head>
<body>

<!-- 搜索框1：Google 搜索 -->
<div class="search-wrapper">
    <form method="get" action="https://www.google.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Google Search">
    </form>
</div>

<!-- 搜索框2：Bing 搜索 -->
<div class="search-wrapper">
    <form method="get" action="https://www.bing.com/search" target="_blank" class="search-form">
        <input type="text" name="q" size="30">
        <input type="submit" value="Bing Search">
    </form>
</div>

<!-- ICON 图片下载链接（按钮样式） -->
<ul class="link-list">
    <li><a href="IOCN_1.jpg" class="button-link">ICON</a></li>
</ul>

<!-- 小标题 links -->
<h1>links</h1>

<!-- 外部链接列表（按钮样式） -->
<ul class="link-list">
    <li><a href="http://jailbreak.psp2.dev/" target="_blank" class="button-link">UNLOCK VITA</a></li>
</ul>

<!-- 
    ============================================================
    GitHub 部署说明：
    1. 将此文件保存为 index.html
    2. 确保图片文件 "IOCN 1.jpg" 与 index.html 在同一目录（根目录）
    3. 在 GitHub 上创建一个仓库（例如 my-nav）
    4. 上传这两个文件到仓库根目录
    5. 启用 GitHub Pages（Settings → Pages → Branch: main）
    6. 访问 https://你的用户名.github.io/仓库名/ 即可
    本页面无任何外部依赖，无脚本，完美兼容所有古老浏览器。
    ============================================================
-->
</body>
</html>
